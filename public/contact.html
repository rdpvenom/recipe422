<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | UrbanThread</title>
  <meta name="description" content="Contact UrbanThread Clothing for product, order, and support questions." />
  <link rel="canonical" href="https://www.yourdomain.com/contact.html" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container nav">
      <h1 class="logo">UrbanThread</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container content">
    <h2>Contact UrbanThread</h2>
    <p>Need help? Fill out the form below and our team will reply within 1–2 business days.</p>

    <form action="#" method="post" style="max-width:600px;">
      <label for="name">Full Name</label><br>
      <input id="name" name="name" type="text" required style="width:100%;padding:10px;margin:8px 0 16px;"><br>

      <label for="email">Email Address</label><br>
      <input id="email" name="email" type="email" required style="width:100%;padding:10px;margin:8px 0 16px;"><br>

      <label for="message">Message</label><br>
      <textarea id="message" name="message" rows="6" required style="width:100%;padding:10px;margin:8px 0 16px;"></textarea><br>

      <button class="btn" type="submit">Send Message</button>
    </form>
  </main>

  <footer>
    <div class="container footer-grid">
      <p>© 2026 UrbanThread Clothing</p>
      <div>
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
      </div>
    </div>
  </footer>
</body>
</html>
